name: Chromatic

# Publishes the Storybook to Chromatic on every push/PR. Chromatic hosts the
# built Storybook (works with private repos on the free tier) and runs visual
# review. Requires the repo secret CHROMATIC_PROJECT_TOKEN (from chromatic.com).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic needs full git history for baselines

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          onlyChanged: true # TurboSnap: only snapshot changed stories
          exitZeroOnChanges: true # don't fail CI on visual diffs; review in Chromatic
